name: Update LG OLED pricing reports

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules run in UTC. This runs at 9am London time across GMT/BST.
    - cron: "0 8,9 * * *"

permissions:
  contents: write

concurrency:
  group: update-lg-oled-pricing
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check London hour
        if: github.event_name == 'schedule'
        run: |
          if [ "$(TZ=Europe/London date +%H)" != "09" ]; then
            echo "Not 9am in London yet; skipping this UTC run."
            echo "SHOULD_RUN=false" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "SHOULD_RUN=true" >> "$GITHUB_ENV"

      - name: Check out repository
        if: github.event_name != 'schedule' || env.SHOULD_RUN == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: github.event_name != 'schedule' || env.SHOULD_RUN == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Refresh pricing data and rebuild pages
        if: github.event_name != 'schedule' || env.SHOULD_RUN == 'true'
        env:
          TZ: Europe/London
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: node update_pricing_reports.js

      - name: Commit updated report pages
        if: github.event_name != 'schedule' || env.SHOULD_RUN == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html retailers/index.html john-lewis/index.html john-lewis/retailer-info/index.html currys/index.html currys/retailer-info/index.html retailer-info.html retailer-info/index.html
          if git diff --cached --quiet; then
            echo "No report changes to commit."
            exit 0
          fi
          git commit -m "Refresh LG OLED pricing reports"
          git push
